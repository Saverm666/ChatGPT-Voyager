<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatGPT-Voyager</title>
    <link rel="stylesheet" href="../vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="page-header">
        <p class="eyebrow">Quick Panel</p>
        <h1>ChatGPT-Voyager</h1>
        <p class="header-desc">
          当前站点支持状态、功能开关、提示词收藏与公式复制历史都集中在这里。
        </p>
      </header>

      <section class="panel">
        <p class="label">当前页面</p>
        <p id="page-title" class="value">读取中...</p>
        <p id="page-url" class="muted"></p>
        <p id="support-note" class="support-note"></p>
      </section>

      <section class="panel">
        <p class="section-title">公式复制格式</p>
        <p class="group-desc">选择点击公式时复制的格式</p>

        <label class="radio-row" for="formula-copy-format-latex">
          <input
            id="formula-copy-format-latex"
            name="formula-copy-format"
            type="radio"
            value="latex"
          />
          <span>LaTeX</span>
        </label>

        <label class="radio-row" for="formula-copy-format-unicode-math">
          <input
            id="formula-copy-format-unicode-math"
            name="formula-copy-format"
            type="radio"
            value="unicode-math"
          />
          <span>UnicodeMath (Word)</span>
        </label>

        <label class="radio-row" for="formula-copy-format-latex-source">
          <input
            id="formula-copy-format-latex-source"
            name="formula-copy-format"
            type="radio"
            value="latex-source"
            checked
          />
          <span>LaTeX (纯文本，无 $ 符号)</span>
        </label>
      </section>

      <section class="panel">
        <p class="label">功能开关</p>

        <label class="toggle-row" for="formula-copier-enabled">
          <span class="toggle-copy">
            <strong>公式点击复制</strong>
            <small>开启后点击公式即可按上方格式复制</small>
          </span>
          <input id="formula-copier-enabled" type="checkbox" />
        </label>

        <label class="toggle-row" for="enter-enhancer-enabled">
          <span class="toggle-copy">
            <strong>Enter / Ctrl+Enter 增强</strong>
            <small>Enter 换行，Ctrl+Enter 发送</small>
          </span>
          <input id="enter-enhancer-enabled" type="checkbox" />
        </label>

        <label class="toggle-row" for="chatgpt-timeline-enabled">
          <span class="toggle-copy">
            <strong>GPT 会话时间线</strong>
            <small>在对话右侧显示跳转时间线，长按节点可星标</small>
          </span>
          <input id="chatgpt-timeline-enabled" type="checkbox" />
        </label>

        <label class="toggle-row" for="notion-close-guard-enabled">
          <span class="toggle-copy">
            <strong>Notion 离开确认</strong>
            <small>关闭、刷新或离开 Notion 页面时弹出确认</small>
          </span>
          <input id="notion-close-guard-enabled" type="checkbox" />
        </label>
      </section>

      <section class="panel">
        <div class="panel-head">
          <div>
            <p class="section-title">公式复制历史</p>
            <p class="group-desc">最近复制的公式会保存在这里，点击即可再次复制。</p>
          </div>
          <button id="clear-formula-history" type="button" class="inline-action">
            清空
          </button>
        </div>

        <p id="formula-history-empty" class="empty-state">还没有复制记录。</p>
        <div id="formula-history-list" class="stack-list"></div>
      </section>

      <section class="panel">
        <p class="section-title">提示词收藏</p>
        <p class="group-desc">在设置页保存常用提示词后，这里可以一键复制。</p>
        <p id="saved-prompts-empty" class="empty-state">
          还没有保存提示词，点击下方“打开设置页”开始添加。
        </p>
        <div id="saved-prompts-list" class="stack-list"></div>
      </section>

      <footer class="popup-footer">
        <div class="actions">
          <button id="open-options" type="button" class="secondary">打开完整设置页</button>
        </div>

        <p id="status" class="status">修改后会自动保存，并在已打开页面即时生效。</p>
      </footer>
    </main>
    <script src="../shared/shared.js"></script>
    <script src="../vendor/tex-to-unicode/tex-to-unicodemath.ascii.js"></script>
    <script src="../vendor/katex/katex.min.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
